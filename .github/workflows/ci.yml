name: VEX Explorer CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Install wasm-pack
      run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Node dependencies
      run: npm install

    - name: Build WASM
      run: npm run wasm:build

    - name: Run Rust tests
      run: cd vex-verify && cargo test

    - name: Run Lint
      run: npm run lint

    - name: Security Audit
      run: npm audit --audit-level=high

    - name: Build Next.js
      run: npm run build

    - name: Check Bundle Size
      run: |
        SIZE=$(du -sk .next/static | cut -f1)
        echo "Static assets size: ${SIZE}KB"
        if [ $SIZE -gt 1024 ]; then
          echo "Warning: Bundle size exceeds 1MB budget!"
        fi
